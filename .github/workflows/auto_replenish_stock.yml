name: Auto Replenish Vtuber Stock

on:
  workflow_dispatch:
    # GitHubのAPIを叩いて実行するか、UIから手動実行します

jobs:
  replenish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install system dependencies (ffmpeg, yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip install yt-dlp

      - name: Install Node.js dependencies
        run: npm install --legacy-peer-deps
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: true

      - name: Run discovery
        run: npx tsx scripts/discover.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Run automated analysis
        run: npx tsx scripts/generate_next.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
